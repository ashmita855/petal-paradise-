<head>

body {

}

  background-clip: text;
  color: transparent;
}

.hero p {
  font-size: 1.08rem;
  line-height: 1.8;
  color: var(--muted);
  max-width: 60ch;
  margin: 18px 0 28px;
}

.hero-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  margin-bottom: 26px;
}

}
.btn:hover { transform: translateY(-2px); }
.btn-primary {
  background: linear-gradient(135deg, var(--rose), #f39bbd);

}
.btn-secondary {

.mini-card {

}

.bouquet-panel {
  position: relative;

  overflow: hidden;
  isolation: isolate;
}

  border-radius: 50%;

  z-index: -1;
  opacity: 0.7;
}
